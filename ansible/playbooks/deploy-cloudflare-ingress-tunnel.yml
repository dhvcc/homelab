- name: Deploy Cloudflare Tunnel to Kubernetes
  hosts: k8s_control_plane[0]
  become: true
  gather_facts: false
  vars: 
    tunnel_namespace: homelab
    tunnel_replicas: 2
    kubeconfig_local_path: /etc/rancher/k3s/k3s.yaml  # Changed from /root/.kube/config
  tasks:
    - name: Ensure namespace exists
      shell: |
        k3s kubectl create namespace {{ tunnel_namespace }} --dry-run=client -o yaml | k3s kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      changed_when: false

    - name: Create Cloudflare Tunnel secret
      shell: |
        set -euo pipefail
        k3s kubectl -n {{ tunnel_namespace }} create secret generic cloudflare-tunnel-token \
          --from-literal=token="{{ cloudflare_ingress_tunnel_token }}" \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: secret_result
      changed_when: "'created' in secret_result.stdout or 'configured' in secret_result.stdout"

    - name: Create Cloudflare Tunnel deployment manifest
      copy:
        dest: /tmp/cloudflare-tunnel.yaml
        content: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cloudflared
            namespace: {{ tunnel_namespace }}
            labels:
              app: cloudflared
          spec:
            replicas: {{ tunnel_replicas }}
            selector:
              matchLabels:
                app: cloudflared
            template:
              metadata:
                labels:
                  app: cloudflared
              spec:
                containers:
                - name: cloudflared
                  image: cloudflare/cloudflared:latest
                  args:
                  - tunnel
                  - --no-autoupdate
                  - --metrics
                  - 0.0.0.0:2000
                  - run
                  - --token
                  - $(TUNNEL_TOKEN)
                  env:
                  - name: TUNNEL_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: cloudflare-tunnel-token
                        key: token
                  livenessProbe:
                    httpGet:
                      path: /ready
                      port: 2000
                    failureThreshold: 3
                    initialDelaySeconds: 30
                    periodSeconds: 30
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 2000
                    failureThreshold: 3
                    initialDelaySeconds: 10
                    periodSeconds: 10
                  resources:
                    requests:
                      memory: "64Mi"
                      cpu: "100m"
                    limits:
                      memory: "128Mi"
                      cpu: "200m"
                affinity:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                    - weight: 100
                      podAffinityTerm:
                        labelSelector:
                          matchLabels:
                            app: cloudflared
                        topologyKey: kubernetes.io/hostname
        mode: '0644'

    - name: Apply Cloudflare Tunnel deployment
      command: k3s kubectl apply -f /tmp/cloudflare-tunnel.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: deploy_result
      changed_when: "'configured' in deploy_result.stdout or 'created' in deploy_result.stdout"

    - name: Wait for tunnel pods to be ready
      command: >
        k3s kubectl wait --for=condition=ready pod
        --selector=app=cloudflared
        --namespace {{ tunnel_namespace }}
        --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: wait_result
      changed_when: false
      retries: 3
      delay: 10
      until: wait_result.rc == 0

    - name: Get tunnel pod status
      command: k3s kubectl get pods -n {{ tunnel_namespace }} -l app=cloudflared -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: pod_status
      changed_when: false

    - name: Display deployment info
      debug:
        msg:
          - "Cloudflare Tunnel deployed successfully!"
          - "{{ tunnel_replicas }} replicas running across your cluster"
          - ""
          - "Pod status:"
          - "{{ pod_status.stdout }}"
          - ""
          - "Your services are now accessible via Cloudflare Tunnel!"
          - "No port forwarding needed on your router."
          - ""
          - "Next steps:"
          - "1. Verify tunnel is connected in Cloudflare dashboard"
          - "2. Access your services via public hostnames"
          - "3. Add more hostnames in Cloudflare Tunnel config as needed"

    - name: Clean up manifest
      file:
        path: /tmp/cloudflare-tunnel.yaml
        state: absent

