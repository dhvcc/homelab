---
- name: Deploy Helm Chart
  hosts: k8s_control_plane[0]
  become: true
  gather_facts: true

  pre_tasks:
    - name: Check k3s availability
      command: which k3s
      changed_when: false
      failed_when: k3s_check.rc != 0
      register: k3s_check

    - name: Check helm availability
      command: which helm
      changed_when: false
      failed_when: false
      register: helm_check

    - name: Fail if helm not found
      fail:
        msg: "helm is required but not installed on this system"
      when: helm_check.rc != 0

    - name: Validate helm_release variable
      fail:
        msg: "helm_release variable is required. Usage: ansible-playbook deploy-helm.yml -e helm_release=loki"
      when: helm_release is undefined or helm_release | length == 0

  vars:
    helm_repo_path: /opt/homelab-k8s/helm
    helmfile_path: "{{ playbook_dir }}/../../k8s/helm/helmfile.yaml"
    kubeconfig_local_path: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Load helmfile
      include_vars:
        file: "{{ helmfile_path }}"
        name: helmfile

    - name: Find matching releases
      set_fact:
        matching_releases: "{{ helmfile.releases | selectattr('name', 'equalto', helm_release) | list }}"

    - name: Extract release info
      set_fact:
        release_info: "{{ matching_releases[0] if matching_releases | length > 0 else {} }}"

    - name: Validate release exists
      fail:
        msg: |
          Release '{{ helm_release }}' not found in helmfile.
          Available releases: {{ helmfile.releases | map(attribute='name') | join(', ') }}
      when: release_info == {}

    - name: Ensure namespace exists
      shell: |
        k3s kubectl create namespace {{ release_info.namespace }} --dry-run=client -o yaml | k3s kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      changed_when: false

    - name: Add Helm repositories
      command: helm repo add {{ item.name }} {{ item.url }}
      loop: "{{ helmfile.repositories }}"
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: helm_add_repo
      changed_when: "'already exists' not in helm_add_repo.stderr"
      failed_when: false

    - name: Update Helm repositories
      command: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      changed_when: false

    - name: Ensure helm values directory exists
      file:
        path: "{{ helm_repo_path }}"
        state: directory
        mode: '0755'

    - name: Clean stale helm chart values
      file:
        path: "{{ helm_repo_path }}/{{ helm_release }}"
        state: absent

    - name: Copy helm chart values
      copy:
        src: "{{ playbook_dir }}/../../k8s/helm/{{ helm_release }}/"
        dest: "{{ helm_repo_path }}/{{ helm_release }}/"
        mode: '0644'

    - name: Determine chart path
      set_fact:
        chart_path: "{{ release_info.chart if '/' in release_info.chart else helm_repo_path + '/' + helm_release }}"

    - name: Deploy {{ helm_release }}
      command: |
        helm upgrade --install {{ helm_release }} {{ chart_path }} \
          --namespace {{ release_info.namespace }} \
          --atomic \
          --values {{ helm_repo_path }}/{{ helm_release }}/values.yaml \
          --wait \
          --timeout {{ helmfile.helmDefaults.timeout }}s
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: helm_deploy
      changed_when: "'has been upgraded' in helm_deploy.stdout or 'has been installed' in helm_deploy.stdout"

    - name: Deployment status
      debug:
        msg: "{{ helm_release }} deployed to namespace {{ release_info.namespace }}"
