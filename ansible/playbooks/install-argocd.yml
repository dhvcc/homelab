---
- name: Install ArgoCD and bootstrap homelab applications
  hosts: k8s_control_plane[0]
  become: true
  gather_facts: false

  vars:
    argocd_namespace: argocd
    argocd_release_name: argocd
    argocd_repo_url: https://github.com/dhvcc/homelab.git
    argocd_target_revision: main
    argocd_chart_version: 9.4.10
    argocd_chart_repo_name: argo
    argocd_chart_repo_url: https://argoproj.github.io/argo-helm
    argocd_repo_secret_name: homelab-repo
    argocd_repo_secret_path: /tmp/homelab-argocd-repository.yaml
    argocd_root_application_path: /tmp/homelab-argocd-root-application.yaml
    cloudflare_tunnel_secret_name: cloudflare-tunnel-token
    kubeconfig_local_path: /etc/rancher/k3s/k3s.yaml

  pre_tasks:
    - name: Check k3s availability
      command: which k3s
      changed_when: false
      failed_when: k3s_check.rc != 0
      register: k3s_check

    - name: Check helm availability
      command: which helm
      changed_when: false
      failed_when: helm_check.rc != 0
      register: helm_check

    - name: Validate repository credential inputs
      assert:
        that:
          - not ((argocd_repo_username | default('')) and not (argocd_repo_password | default('')))
          - not ((argocd_repo_password | default('')) and not (argocd_repo_username | default('')))
        fail_msg: "argocd_repo_username and argocd_repo_password must be provided together."

  tasks:
    - name: Ensure ArgoCD namespace exists
      shell: |
        k3s kubectl create namespace {{ argocd_namespace }} --dry-run=client -o yaml | k3s kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      changed_when: false

    - name: Ensure homelab namespace exists
      shell: |
        k3s kubectl create namespace homelab --dry-run=client -o yaml | k3s kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      changed_when: false

    - name: Add Argo Helm repository
      command: helm repo add {{ argocd_chart_repo_name }} {{ argocd_chart_repo_url }}
      register: argocd_repo_add
      changed_when: "'already exists' not in argocd_repo_add.stderr"
      failed_when: false

    - name: Update Helm repositories
      command: helm repo update
      changed_when: false

    - name: Install ArgoCD
      command: >
        helm upgrade --install {{ argocd_release_name }} {{ argocd_chart_repo_name }}/argo-cd
        --namespace {{ argocd_namespace }}
        --create-namespace
        --version {{ argocd_chart_version }}
        --wait
        --timeout 600s
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: argocd_install
      changed_when: "'has been upgraded' in argocd_install.stdout or 'has been installed' in argocd_install.stdout"

    - name: Wait for ArgoCD pods to be ready
      command: >
        k3s kubectl wait pod
        --namespace {{ argocd_namespace }}
        --selector app.kubernetes.io/part-of=argocd
        --for=condition=Ready
        --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      changed_when: false

    - name: Create Cloudflare tunnel secret
      shell: |
        set -euo pipefail
        k3s kubectl -n homelab create secret generic {{ cloudflare_tunnel_secret_name }} \
          --from-literal=token="{{ cloudflare_ingress_tunnel_token }}" \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: cloudflare_secret_result
      changed_when: "'created' in cloudflare_secret_result.stdout or 'configured' in cloudflare_secret_result.stdout"
      when: cloudflare_ingress_tunnel_token | default('') | length > 0

    - name: Render ArgoCD repository secret
      template:
        src: "{{ playbook_dir }}/../templates/argocd/repository-secret.yaml.j2"
        dest: "{{ argocd_repo_secret_path }}"
        mode: "0600"
      when: >
        (argocd_repo_username | default('') | length > 0 and argocd_repo_password | default('') | length > 0)
        or (argocd_repo_ssh_private_key | default('') | length > 0)

    - name: Apply ArgoCD repository secret
      command: k3s kubectl apply -f {{ argocd_repo_secret_path }}
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: argocd_repo_secret_apply
      changed_when: "'created' in argocd_repo_secret_apply.stdout or 'configured' in argocd_repo_secret_apply.stdout"
      when: >
        (argocd_repo_username | default('') | length > 0 and argocd_repo_password | default('') | length > 0)
        or (argocd_repo_ssh_private_key | default('') | length > 0)

    - name: Apply homelab ArgoCD project
      command: >
        k3s kubectl apply -f {{ playbook_dir }}/../../k8s/argocd/bootstrap/project.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: argocd_project_apply
      changed_when: "'created' in argocd_project_apply.stdout or 'configured' in argocd_project_apply.stdout"

    - name: Render homelab root application
      template:
        src: "{{ playbook_dir }}/../templates/argocd/root-application.yaml.j2"
        dest: "{{ argocd_root_application_path }}"
        mode: "0644"

    - name: Apply homelab root application
      command: k3s kubectl apply -f {{ argocd_root_application_path }}
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: argocd_root_apply
      changed_when: "'created' in argocd_root_apply.stdout or 'configured' in argocd_root_apply.stdout"

  post_tasks:
    - name: Clean rendered repository secret
      file:
        path: "{{ argocd_repo_secret_path }}"
        state: absent

    - name: Clean rendered root application
      file:
        path: "{{ argocd_root_application_path }}"
        state: absent
